apiVersion: batch/v1
kind: Job
metadata:
  name: pre-sync-db-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: db-migrate
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - "echo 'Running pre-sync: database migration...' && sleep 5 && echo 'Migration complete.'"
      restartPolicy: Never
  backoffLimit: 0
