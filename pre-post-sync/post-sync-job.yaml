apiVersion: batch/v1
kind: Job
metadata:
  name: post-sync-notify
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: notify
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - "echo 'Running post-sync: sending deployment notification...' && sleep 3 && echo 'Notification sent.'"
      restartPolicy: Never
  backoffLimit: 0
