apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "bluegreen-demo.fullname" . }}
  labels:
    app: {{ template "bluegreen-demo.name" . }}
    chart: {{ template "bluegreen-demo.chart" . }}
    release: {{ .Release.Name }}
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>{{ .Values.app.title }} {{ .Values.app.version }}</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          background: {{ .Values.app.color }};
          color: #fff;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
        }
        .card {
          background: rgba(255,255,255,0.15);
          backdrop-filter: blur(10px);
          border-radius: 16px;
          padding: 40px;
          max-width: 500px;
          width: 90%;
          text-align: center;
        }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .version {
          display: inline-block;
          background: rgba(255,255,255,0.25);
          padding: 4px 16px;
          border-radius: 20px;
          font-size: 0.9rem;
          margin-bottom: 24px;
        }
        h2 { font-size: 1.1rem; margin-bottom: 12px; opacity: 0.9; }
        ul { list-style: none; }
        li {
          background: rgba(255,255,255,0.1);
          margin: 8px 0;
          padding: 12px;
          border-radius: 8px;
          font-size: 1rem;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>{{ .Values.app.title }}</h1>
        <span class="version">{{ .Values.app.version }}</span>
        <h2>Features</h2>
        <ul>
          {{- range .Values.app.features }}
          <li>{{ . }}</li>
          {{- end }}
        </ul>
      </div>
    </body>
    </html>
