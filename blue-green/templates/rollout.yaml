apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ template "bluegreen-demo.fullname" . }}
  labels:
    app: {{ template "bluegreen-demo.name" . }}
    chart: {{ template "bluegreen-demo.chart" . }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: {{ template "bluegreen-demo.name" . }}
      release: {{ .Release.Name }}
  strategy:
    blueGreen:
      activeService: {{ template "bluegreen-demo.fullname" . }}
      previewService: {{ template "bluegreen-demo.fullname" . }}-preview
      autoPromotionEnabled: false
  template:
    metadata:
      labels:
        app: {{ template "bluegreen-demo.name" . }}
        release: {{ .Release.Name }}
      annotations:
        # Force rollout when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: html
          configMap:
            name: {{ template "bluegreen-demo.fullname" . }}-{{ .Values.app.version }}
    {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
    {{- end }}
