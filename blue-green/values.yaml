# Blue-Green Demo App
# Change these values and push to trigger a new blue-green deployment.

replicaCount: 2

hpa:
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

# --- App config: edit these to demo a new release ---
app:
  # Version label shown on the page
  version: "v3"
  # Background color of the page (use any CSS color)
  color: "#06402b"
  # Title displayed on the page
  title: "Blue-Green Demo"
  # Features list shown on the page - add/remove to simulate new releases
  features:
    - "User authentication"
    - "Dashboard view"
    - "Search functionality"

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi
nodeSelector: {}
tolerations: []
affinity: {}
