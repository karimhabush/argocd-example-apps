# Blue-Green Demo App
# Change these values and push to trigger a new blue-green deployment.

replicaCount: 2

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

# --- App config: edit these to demo a new release ---
app:
  # Version label shown on the page
  version: "v1"
  # Background color of the page (use any CSS color)
  color: "#1a73e8"
  # Title displayed on the page
  title: "Blue-Green Demo"
  # Features list shown on the page - add/remove to simulate new releases
  features:
    - "User authentication"
    - "Dashboard view"

service:
  type: ClusterIP
  port: 80

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
